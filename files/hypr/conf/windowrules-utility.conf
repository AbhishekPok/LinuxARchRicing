# ============================================================
# Utility Floating Window Rules
# ============================================================

# Bluetooth manager
windowrule {
    name = float-blueman
    match:class = blueman-manager
    float = yes
    center = yes
    size = 900 600
}

# Theme manager
windowrule {
    name = float-nwg-look
    match:class = nwg-look
    float = yes
    center = yes
    size = 900 650
}

# Audio controls
windowrule {
    name = float-pavucontrol
    match:class = pavucontrol
    float = yes
    center = yes
    size = 850 600
}

# Common dialogs
windowrule {
    name = float-file-dialogs
    match:title = ^(Open File|Save File|Select a File|Choose File|Open Folder).*
    float = yes
    center = yes
}

# Picture-in-picture
windowrule {
    name = float-pip
    match:title = ^Picture-in-Picture$
    float = yes
    pin = yes
    move = 70% 60%
    size = 480 270
}
