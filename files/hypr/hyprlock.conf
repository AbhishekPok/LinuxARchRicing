# ============================================================
# Hyprlock DevOps Dark Command Center
# Arch / Hyprland / Catppuccin Mocha Inspired
# ============================================================

general {
    hide_cursor = false
    ignore_empty_input = true
    immediate_render = true
    fail_timeout = 1500
}

# Background
background {
    monitor =
    path = /home/abhi/Pictures/Wallpapers/wallpaper_caven.jpg
    color = rgba(17, 17, 27, 1.0)

    blur_passes = 3
    blur_size = 8
    brightness = 0.42
    contrast = 1.05
    vibrancy = 0.18
    vibrancy_darkness = 0.25
}

# Main clock
label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 0.98)
    font_size = 86
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B %Y"
    color = rgba(166, 173, 200, 0.92)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 78
    halign = center
    valign = center
}

# Welcome text
label {
    monitor =
    text = Welcome back, $USER
    color = rgba(137, 180, 250, 0.95)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 34
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 420, 58
    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true

    outer_color = rgba(137, 180, 250, 0.78)
    inner_color = rgba(30, 30, 46, 0.78)
    font_color = rgba(205, 214, 244, 0.95)

    check_color = rgba(166, 227, 161, 0.95)
    fail_color = rgba(243, 139, 168, 0.95)

    placeholder_text = <span foreground="##a6adc8">Enter Password</span>
    fail_text = <span foreground="##f38ba8">Authentication Failed</span>

    font_family = JetBrainsMono Nerd Font
    fade_on_empty = false
    rounding = 18

    position = 0, -55
    halign = center
    valign = center
}

# Small top system identity
label {
    monitor =
    text = ’īā  Ruby  ŌĆó  Hyprland
    color = rgba(249, 226, 175, 0.88)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -28
    halign = center
    valign = top
}

# Bottom status bar shape
shape {
    monitor =
    size = 760, 38
    color = rgba(17, 17, 27, 0.58)
    rounding = 14
    border_size = 1
    border_color = rgba(137, 180, 250, 0.35)
    position = 0, 24
    halign = center
    valign = bottom
}

# Bottom status bar text
label {
    monitor =
    text = cmd[update:5000] bash -lc 'BAT=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -n1); BAT=${BAT:-AC}; WIFI=$(iwgetid -r 2>/dev/null); WIFI=${WIFI:-Offline}; VOL=$(wpctl get-volume @DEFAULT_AUDIO_SINK@ 2>/dev/null | awk "{print int(\$2*100)}"); VOL=${VOL:-0}; LAYOUT=$(hyprctl devices -j 2>/dev/null | jq -r ".keyboards[0].active_keymap" 2>/dev/null); LAYOUT=${LAYOUT:-Default}; echo "¾░ü╣ ${BAT}%   ’ć½ ${WIFI}   ¾░ĢŠ ${VOL}%   ’ä£ ${LAYOUT}"'
    color = rgba(205, 214, 244, 0.86)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 35
    halign = center
    valign = bottom
}

# Hint
label {
    monitor =
    text = Press ESC to cancel
    color = rgba(108, 112, 134, 0.75)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, 8
    halign = center
    valign = bottom
}
