# ============================================================
# Kitty DevOps Dark Command Center
# Arch / Hyprland / Catppuccin Mocha Inspired
# ============================================================

# ---------- Font ----------
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

disable_ligatures never

# ---------- Window ----------
background_opacity 0.92
dynamic_background_opacity yes

window_padding_width 6
single_window_margin_width 0
window_margin_width 0

confirm_os_window_close 0
remember_window_size yes
initial_window_width  1100
initial_window_height 680

wayland_titlebar_color background
hide_window_decorations yes

# ---------- Cursor ----------
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor #89b4fa
cursor_text_color #1e1e2e

# ---------- Scrollback ----------
scrollback_lines 20000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0

# ---------- Mouse / URLs ----------
mouse_hide_wait 3.0
url_color #89b4fa
url_style curly
open_url_with default
copy_on_select yes
strip_trailing_spaces smart

# ---------- Bell ----------
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab no

# ---------- Tabs ----------
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_title_template " {index}: {title} "
active_tab_foreground #1e1e2e
active_tab_background #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244

# ---------- Layouts ----------
enabled_layouts splits,stack,tall,fat,grid

# ---------- Keybinds: windows / splits ----------
map ctrl+shift+enter new_window
map ctrl+shift+w close_window

map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

map ctrl+shift+left resize_window narrower 5
map ctrl+shift+right resize_window wider 5
map ctrl+shift+up resize_window taller 5
map ctrl+shift+down resize_window shorter 5

map ctrl+shift+space next_layout

# ---------- Keybinds: tabs ----------
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# ---------- Keybinds: utility ----------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+f launch --type=overlay --stdin-source=@screen_scrollback fzf
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

